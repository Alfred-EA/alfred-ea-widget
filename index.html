<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALFRED-EA Performance</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="alfred-panel">

    <div class="alfred-title">
        PERFORMANCE ALFRED-EA
    </div>

    <div class="alfred-grid">

        <div class="alfred-box">
            <div class="alfred-box-title">
                Cette semaine
            </div>

            <div class="alfred-value" id="week">
                --
            </div>

        </div>

        <div class="alfred-box">

            <div class="alfred-box-title">
                Ce mois-ci
            </div>

            <div class="alfred-value" id="month">
                --
            </div>

        </div>

        <div class="alfred-box">

            <div class="alfred-box-title">
                Depuis le début de l'année
            </div>

            <div class="alfred-value" id="year">
                --
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
